databases:
  - name: retour-chez-soi-db
    databaseName: retour_chez_soi
    plan: free
    region: oregon

services:
  # API — Node/Express en conteneur Docker (voir backend/Dockerfile)
  - type: web
    name: retour-chez-soi-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: retour-chez-soi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Render ne permet pas d'interpoler des chaînes dans les valeurs YAML ;
      # FRONTEND_HOST (le nom court du service) est donc recomposé en URL
      # complète directement dans backend/src/config/env.ts.
      - key: FRONTEND_HOST
        fromService:
          name: retour-chez-soi
          type: web
          property: host
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "Le Retour Chez Soi <bonjour@leretourchezsoi.ca>"
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false

  # Frontend — site statique (build Vite)
  - type: web
    name: retour-chez-soi
    runtime: static
    # VITE_API_URL doit être connue au moment du build (Vite l'intègre au
    # bundle) ; on la compose ici même via l'interpolation shell normale de
    # buildCommand, à partir du nom court du service API.
    buildCommand: 'VITE_API_URL="https://${API_HOST}.onrender.com/api" npm ci && npm run build'
    staticPublishPath: ./dist
    plan: free
    region: oregon
    envVars:
      - key: API_HOST
        fromService:
          name: retour-chez-soi-api
          type: web
          property: host
    routes:
      # Redirection SPA : toutes les routes non-fichier retombent sur index.html
      - type: rewrite
        source: /*
        destination: /index.html
